  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
      font-family: 'Rajdhani', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      color: white;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 2.5rem;
    }

    nav a {
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s, text-shadow 0.2s;
    }

    nav a:hover { text-shadow: 0 0 8px currentColor; }

    /* ── Speech bubble ── */
    .bubble {
      position: fixed;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 15, 0.92);
      border: 1px solid rgba(255, 230, 0, 0.25);
      border-left: 3px solid #FFE600;
      box-shadow: 0 0 24px rgba(255, 230, 0, 0.1), inset 0 0 20px rgba(255, 230, 0, 0.03);
      border-radius: 0;
      padding: 1.1rem 1.3rem 0.9rem;
      width: min(300px, 82vw);
      text-align: left;
      z-index: 10;
      pointer-events: all;
      transition: opacity 0.4s, transform 0.4s;
    }

    .bubble.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(-8px);
      pointer-events: none;
    }

    #bubble-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.98rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.6;
      min-height: 1.6em;
    }

    .bubble-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.7rem;
      min-height: 1.2em;
    }

    #bubble-next {
      background: none;
      border: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      color: #00F5FF;
      cursor: pointer;
      padding: 0;
      letter-spacing: 1px;
      transition: color 0.2s, text-shadow 0.2s;
    }

    #bubble-next:hover {
      color: white;
      text-shadow: 0 0 8px #00F5FF;
    }

    /* ── Loading bar ── */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      text-align: center;
    }

    .loading-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 4px;
      color: #00F5FF;
      margin-bottom: 0.8rem;
    }

    .loading-bar {
      width: 180px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      background: #FFE600;
      box-shadow: 0 0 8px #FFE600;
      animation: scanbar 1.1s ease-in-out infinite;
    }

    @keyframes scanbar {
      0%   { width: 0;    margin-left: 0; }
      45%  { width: 100%; margin-left: 0; }
      55%  { width: 100%; margin-left: 0; }
      100% { width: 0;    margin-left: 100%; }
    }

    /* ── Hint ── */
    #hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: #FFE600;
      text-shadow: 0 0 10px rgba(255, 230, 0, 0.7), 0 0 24px rgba(255, 230, 0, 0.3);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
      animation: hint-pulse 2.4s ease-in-out infinite;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Page overlay ── */
    #page-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      z-index: 99;
      pointer-events: none;
      opacity: 1;
      transform: scale(1.05);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    #page-overlay.hidden {
      opacity: 0;
      transform: scale(1);
    }

    /* ── Cursor trail (desktop only) ── */
    #cursor-trail {
      position: fixed;
      width: 7px;
      height: 7px;
      background: #FFE600;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 0 10px #FFE600, 0 0 22px rgba(255, 230, 0, 0.35);
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    @media (hover: hover) {
      #cursor-trail { opacity: 1; }
    }

    /* ── Mobile pulse ring ── */
    #pulse-ring {
      display: none;
    }

    @media (max-width: 768px) {
      #pulse-ring {
        position: fixed;
        width: 110px;
        height: 110px;
        border: 2px solid #FFE600;
        border-radius: 50%;
        top: 48%;
        left: 50%;
        z-index: 5;
        pointer-events: none;
        animation: pulse-ring 2.2s ease-out infinite;
      }
    }

    @keyframes pulse-ring {
      0%   { transform: translate(-50%, -50%) scale(0.85); opacity: 0.7; }
      70%  { transform: translate(-50%, -50%) scale(1.35); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0; }
    }

<body>

  <div id="page-overlay"></div>
  <div id="cursor-trail"></div>

  <nav>
    <a href="index.html" style="color:#FFE600;">&gt; HOME</a>
    <a href="about.html" style="color:rgba(255,255,255,0.35);">&gt; ABOUT</a>
  </nav>

  <div id="loading">
    <div class="loading-label">LOADING</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>

  <div class="bubble" id="bubble">
    <p id="bubble-text"></p>
    <div class="bubble-footer">
      <button id="bubble-next">NEXT &rarr;</button>
    </div>
  </div>

  <div id="hint">tap to dance</div>
  <div id="pulse-ring"></div>

  <canvas id="canvas"></canvas>

  <script>
    // Page fade in
    const overlay = document.getElementById('page-overlay');
    window.addEventListener('load', () => {
      requestAnimationFrame(() => overlay.classList.add('hidden'));
    });

    // Cursor trail
    const trail = document.getElementById('cursor-trail');
    let trailX = window.innerWidth / 2, trailY = window.innerHeight / 2;
    let cursorX = trailX, cursorY = trailY;

    document.addEventListener('mousemove', (e) => {
      cursorX = e.clientX;
      cursorY = e.clientY;
    });

    (function moveTrail() {
      trailX += (cursorX - trailX) * 0.14;
      trailY += (cursorY - trailY) * 0.14;
      trail.style.left = trailX + 'px';
      trail.style.top  = trailY + 'px';
      requestAnimationFrame(moveTrail);
    })();

    // Bubble messages + typing animation
    const messages = [
      "Hey, I'm Aris, welcome to my website.",
      "Here you'll see a bit of who I am and what I do.",
      "I'm into SEO, escape rooms with my girlfriend, and messing around with anything AI-related.",
      "Wanna see me dance? Just give me a little push!"
    ];

    let msgIndex = 0;
    let typingTimer = null;
    const bubbleText = document.getElementById('bubble-text');
    const bubbleNext = document.getElementById('bubble-next');
    const pulseRing  = document.getElementById('pulse-ring');

    function typeText(text) {
      if (typingTimer) clearInterval(typingTimer);
      bubbleNext.style.display = 'none';
      bubbleText.textContent = '';
      let i = 0;
      typingTimer = setInterval(() => {
        bubbleText.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(typingTimer);
          typingTimer = null;
          if (msgIndex < messages.length - 1) {
            bubbleNext.style.display = 'inline';
          }
          if (msgIndex === messages.length - 1 && pulseRing) {
            pulseRing.style.display = 'block';
          }
        }
      }, 28);
    }

    function updateBubble() {
      if (pulseRing) pulseRing.style.display = 'none';
      typeText(messages[msgIndex]);
    }

    bubbleNext.addEventListener('click', (e) => {
      e.stopPropagation();
      if (msgIndex < messages.length - 1) {
        msgIndex++;
        updateBubble();
      }
    });

    window.resetBubble = () => {
      msgIndex = 0;
      updateBubble();
    };

    window.addEventListener('load', updateBubble);
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.0, 3.5);
    camera.lookAt(0, 1.0, 0);

    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('canvas'),
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
    keyLight.position.set(2, 3, 4);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x6688cc, 0.5);
    fillLight.position.set(-3, 1, -2);
    scene.add(fillLight);

    let mouseX = 0, mouseY = 0, smoothX = 0, smoothY = 0;
    let isZooming = false;
    let zoomTarget = null;

    // Nav zoom transition
    document.querySelectorAll('nav a[href]').forEach(link => {
      const href = link.getAttribute('href');
      if (href && !href.startsWith('http') && !href.startsWith('mailto')) {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          isZooming = true;
          zoomTarget = href;

          setTimeout(() => {
            const overlay = document.getElementById('page-overlay');
            if (overlay) {
              overlay.style.transition = 'opacity 0.4s ease';
              overlay.style.opacity = '1';
            }
          }, 350);

          setTimeout(() => window.location.href = href, 800);
        });
      }
    });

    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      mouseX = (t.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(t.clientY / window.innerHeight) * 2 + 1;
    }, { passive: true });

    const clock = new THREE.Clock();
    const bubble = document.getElementById('bubble');
    const hint   = document.getElementById('hint');
    let isDancing = false;
    let idleModel = null, danceModel = null;
    let idleMixer = null, danceMixer = null;
    let danceClip = null;
    let idleHeadBone = null, idleNeckBone = null;
    let headBone = null, neckBone = null;
    let loadedCount = 0;

    const BONE_NAMES = {
      head: ['Head', 'mixamorigHead'],
      neck: ['Neck', 'mixamorigNeck']
    };

    function findBones(model, onHead, onNeck) {
      model.traverse((obj) => {
        if (obj.isSkinnedMesh && obj.skeleton) {
          obj.skeleton.bones.forEach((bone) => {
            if (BONE_NAMES.head.includes(bone.name)) onHead(bone);
            if (BONE_NAMES.neck.includes(bone.name)) onNeck(bone);
          });
        }
      });
    }

    function autoFit(model) {
      model.position.set(0, 0, 0);
      model.updateMatrixWorld();
      const box = new THREE.Box3().setFromObject(model);
      const height = box.max.y - box.min.y;
      model.scale.setScalar(1.8 / height);
      model.position.set(0, 0, 0);
      model.updateMatrixWorld();
      const fitted = new THREE.Box3().setFromObject(model);
      model.position.y = -fitted.min.y;
      model.position.x = 0;
    }

    const loader = new GLTFLoader();

    loader.load('idle.glb', (gltf) => {
      idleModel = gltf.scene;
      autoFit(idleModel);
      scene.add(idleModel);

      findBones(idleModel,
        (b) => { idleHeadBone = b; headBone = b; },
        (b) => { idleNeckBone = b; neckBone = b; }
      );

      if (gltf.animations.length > 0) {
        idleMixer = new THREE.AnimationMixer(idleModel);
        idleMixer.clipAction(gltf.animations[0]).play();
      }

      if (++loadedCount === 2) document.getElementById('loading').remove();
    }, undefined, (err) => console.error('idle.glb failed:', err));

    loader.load('dance.glb', (gltf) => {
      danceModel = gltf.scene;
      autoFit(danceModel);
      danceModel.visible = false;
      scene.add(danceModel);

      if (gltf.animations.length > 0) {
        danceClip = gltf.animations[0];
        danceMixer = new THREE.AnimationMixer(danceModel);

        danceMixer.addEventListener('finished', () => {
          danceModel.visible = false;
          idleModel.visible = true;
          headBone = idleHeadBone;
          neckBone = idleNeckBone;
          isDancing = false;
          bubble.classList.remove('hidden');
          if (window.resetBubble) window.resetBubble();
        });
      }

      if (++loadedCount === 2) document.getElementById('loading').remove();
    }, undefined, (err) => console.error('dance.glb failed:', err));

    window.addEventListener('click', triggerDance);
    window.addEventListener('touchend', triggerDance, { passive: true });

    function triggerDance(e) {
      if (e.target.closest('a') || e.target.closest('.bubble')) return;
      if (!isDancing && danceModel && danceMixer && danceClip) {
        isDancing = true;
        headBone = null;
        neckBone = null;
        idleModel.visible = false;
        danceModel.visible = true;
        bubble.classList.add('hidden');
        hint.style.opacity = '0';

        danceMixer.stopAllAction();
        const action = danceMixer.clipAction(danceClip);
        action.reset();
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;
        action.play();
      }
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      if (idleMixer) idleMixer.update(delta);
      if (danceMixer) danceMixer.update(delta);

      if (isZooming) {
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, 0.8, 0.05);
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 1.45, 0.05);
        camera.lookAt(0, 1.45, 0);
      }

      smoothX += (mouseX - smoothX) * 0.08;
      smoothY += (mouseY - smoothY) * 0.08;

      if (headBone) {
        headBone.rotation.y = smoothX * 0.45;
        headBone.rotation.x = -smoothY * 0.3;
      }
      if (neckBone) {
        neckBone.rotation.y = smoothX * 0.15;
        neckBone.rotation.x = -smoothY * 0.1;
      }

      renderer.render(scene, camera);
    })();
  </script>

</body>
